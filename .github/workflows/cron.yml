name: mo-life-reminder
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: for i in 1 2 3 4; do curl -fsS "${{ secrets.APP_URL }}/cron/reminder?key=${{ secrets.CRON_SECRET }}" || true; [ "$i" -lt 4 ] && sleep 300 || true; done
